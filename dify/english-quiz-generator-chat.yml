app:
  description: learning-site 英会話クイズ用。API 経由で問題 JSON を返し、サイト内の QuizPlayer に表示します。
  icon: "📚"
  icon_background: '#D1E9FF'
  mode: chat
  name: English Quiz Generator
model_config:
  agent_mode:
    enabled: false
    max_iteration: 5
    strategy: function_call
    tools: []
  annotation_reply:
    enabled: false
  chat_prompt_config: {}
  completion_prompt_config: {}
  dataset_configs:
    datasets:
      datasets: []
    retrieval_model: single
  dataset_query_variable: ''
  external_data_tools: []
  file_upload:
    image:
      detail: high
      enabled: false
      number_limits: 3
      transfer_methods:
        - remote_url
        - local_file
  model:
    completion_params:
      frequency_penalty: 0
      max_tokens: 4096
      presence_penalty: 0
      stop: []
      temperature: 0.7
      top_p: 1
    mode: chat
    name: gpt-4o-mini
    provider: openai
  more_like_this:
    enabled: false
  opening_statement: ''
  pre_prompt: |
    あなたは日本人向け英会話クイズの作成者です。learning-site から API で呼び出され、サイト内のクイズ UI に問題が表示されます。チャット画面への誘導や挨拶は不要です。

    ## 入力パラメータ
    - 分野: {{domain}}
    - トピック: {{topic}}
    - 問題数: {{count}}
    - 難易度: {{difficulty}}
    - 弱点分野: {{weak_domains}}

    ## ルール
    1. 問題文は日本語で書く
    2. 各問題に選択肢を4つ含める（choices 配列）
    3. 問題は会話の流れでつながる順番にする
    4. 2問目以降は bridge_text で前の問題との関連を書く（1問目は空文字）
    5. 弱点分野が「なし」でなければ、その分野を多めに出題する
    6. 出力は JSON のみ。説明文・Markdown・コードフェンス（```）は付けない
    7. questions 配列の要素数は {{count}} 個ちょうど

    ## 出力形式（厳守）
    {"questions":[{"question":"...","correct_answer":"...","answer_variants":[],"choices":["a","b","c","d"],"explanation":"...","bridge_text":"..."}]}

    correct_answer は choices のいずれか1つと一致させること。
    answer_variants には正解の表記ゆれ（小文字化して一致する別表現）を入れること。
  prompt_type: simple
  retriever_resource:
    enabled: false
  sensitive_word_avoidance:
    configs: []
    enabled: false
    type: ''
  speech_to_text:
    enabled: false
  suggested_questions: []
  suggested_questions_after_answer:
    enabled: false
  text_to_speech:
    enabled: false
    language: ''
    voice: ''
  user_input_form:
    - text-input:
        default: 英会話
        label: 分野
        required: true
        variable: domain
    - text-input:
        default: English daily conversation
        label: トピック
        required: true
        variable: topic
    - text-input:
        default: '8'
        label: 問題数
        required: true
        variable: count
    - text-input:
        default: 初級
        label: 難易度
        required: true
        variable: difficulty
    - text-input:
        default: なし
        label: 弱点分野
        required: false
        variable: weak_domains
